name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (Node --check)
        run: |
          node --check index.js
          node --check migrate.js
          node --check seed.js
          node --check lib/db.js
          node --check lib/middleware.js
          node --check lib/nlp.js
          node --check lib/tokens.js
          node --check routes/auth.js
          node --check routes/profiles.js

      - name: Verify server starts
        run: |
          timeout 10 node index.js &
          sleep 4
          curl -f http://localhost:3000/health || exit 1
        env:
          PORT: 3000
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
          GITHUB_CALLBACK_URL: http://localhost:3000/auth/github/callback
          JWT_ACCESS_SECRET: ci_access_secret_for_testing
          JWT_REFRESH_SECRET: ci_refresh_secret_for_testing
          FRONTEND_URL: http://localhost:5500
          NODE_ENV: test
